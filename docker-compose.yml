services:
  app:
    build:
      context: .
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: "3000"
      PROXY_HOST: 0.0.0.0
      PROXY_PORT: "18080"
      DATA_DIR: /app/.data
    ports:
      - "3000:3000"
      - "18080:18080"
    volumes:
      - app-data:/app/.data

volumes:
  app-data:
